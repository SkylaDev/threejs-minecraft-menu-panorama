<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama example</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }

        #controls {
            position: fixed;
            right: 10px;
            bottom: 10px;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.5);
            padding: 0 10px 10px 10px;
            color: rgba(50, 50, 50);
        }
    </style>
</head>
    <body>
        <div id="controls">
            <h2 style="text-align: center">Controls:</h2>
            
            <label for="pos" style="display: inline-block"><b>Camera:</b></label>
            <input style="vertical-align: middle" type="range" min="0" max="360" id="pos" />
            <br/>
            <label for="pos" style="display: inline-block"><b>Auto rotate:</b></label>
            <input style="vertical-align: middle" type="checkbox" id="autorotate" name="autorotate" checked />
        </div>
        <script>
            const inputPos = document.querySelector('input[id="pos"]');
            const inputRotate = document.querySelector('input[id="autorotate"]');

            let scene = new THREE.Scene();
            let renderer = new THREE.WebGLRenderer();
            let clock = new THREE.Clock();
            
            let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            let camera_pivot = new THREE.Object3D();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let loader = new THREE.CubeTextureLoader();
            let texture = loader.load(['images/panorama_1.png', 'images/panorama_3.png', 'images/panorama_4.png', 'images/panorama_5.png', 'images/panorama_0.png', 'images/panorama_2.png']);
            scene.background = texture;
            
            scene.add(camera_pivot);
            camera_pivot.add(camera);
            camera.position.set(0, 0, 0.1);
            camera.rotation.x = -0.15 // Closest I could get it to actual Minecraft :p

            function animate() {
                requestAnimationFrame(animate);
                delta = clock.getDelta();
                if (inputRotate.checked){ camera_pivot.rotation.y -= 0.05 * delta; } // Slap this number higher for more speeeed
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
            });

            inputPos.addEventListener('input', () => { camera_pivot.rotation.y = -(inputPos.value * Math.PI / 180) });
        </script>
    </body>
</html>
